name: 行业周报（AI + 电池）

on:
  schedule:
    - cron: '0 0 * * 1'  # 每周一北京时间早上8点（UTC 周一0点）
  workflow_dispatch:       # 允许手动触发

jobs:
  weekly-report:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests python-dotenv

      - name: 创建 .env 文件
        run: |
          cat > .env << EOF
          DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL=${{ secrets.DEEPSEEK_MODEL }}
          GMAIL_ADDRESS=${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD=${{ secrets.GMAIL_APP_PASSWORD }}
          OUTLOOK_EMAIL=${{ secrets.OUTLOOK_EMAIL }}
          OUTLOOK_PASSWORD=${{ secrets.OUTLOOK_PASSWORD }}
          RECIPIENT_EMAILS=${{ secrets.RECIPIENT_EMAILS }}
          EOF

      - name: 验证环境配置
        run: |
          echo "检查必要的 Secrets..."
          [ -z "${{ secrets.DEEPSEEK_API_KEY }}" ] && echo "❌ 错误：DEEPSEEK_API_KEY 未配置" && exit 1 || echo "✓ DEEPSEEK_API_KEY 已配置"
          [ -z "${{ secrets.DEEPSEEK_MODEL }}" ] && echo "❌ 错误：DEEPSEEK_MODEL 未配置" && exit 1 || echo "✓ DEEPSEEK_MODEL 已配置"
          echo "所有必要的 Secrets 已配置"

      - name: 创建必要目录
        run: mkdir -p logs cache output

      # ── AI 行业周报 ──
      - name: 运行 AI 行业周报
        run: python3 main.py --profile ai --period weekly

      # ── 电池行业周报 ──
      - name: 运行电池行业周报
        run: python3 main.py --profile battery --period weekly

      - name: 上传 HTML 产物
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: weekly-reports-${{ github.run_id }}
          path: output/*.html
          retention-days: 7